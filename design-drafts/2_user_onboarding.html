<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SyncLiving - Create Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#4f46e5", // Indigo-600
              secondary: "#10b981", // Emerald-500
              "background-light": "#f8fafc", // Slate-50
              "background-dark": "#0f172a", // Slate-900
            },
            fontFamily: {
              display: ["Inter", "Public Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              "2xl": "1rem",
              "3xl": "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .modal-overlay {
        background-color: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body
    class="bg-slate-100 flex items-center justify-center min-h-screen p-4 md:p-8"
  >
    <!-- Modal Overlay Container -->
    <div
      class="modal-overlay fixed inset-0 z-50 flex items-center justify-center overflow-y-auto p-4"
    >
      <!-- Main Modal -->
      <div
        class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border border-slate-200 dark:border-slate-800"
      >
        <!-- Header -->
        <header
          class="flex items-center justify-between px-8 py-6 border-b border-slate-100 dark:border-slate-800 shrink-0"
        >
          <div class="flex flex-col">
            <h2
              class="text-2xl font-bold text-slate-900 dark:text-slate-100 leading-tight"
            >
              Create Profile
            </h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Tell us a bit about yourself to find your perfect match
            </p>
          </div>
          <button
            class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-400"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto px-8 py-6 space-y-8">
          <!-- Section 1: Basic Info -->
          <section class="space-y-4">
            <div class="flex items-center gap-2 mb-2">
              <span
                class="text-xs font-bold uppercase tracking-wider text-primary"
                >01. Basic Information</span
              >
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="md:col-span-2">
                <label
                  class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                  >Full Name</label
                >
                <input
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                  placeholder="John Doe"
                  type="text"
                />
              </div>
              <div>
                <label
                  class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                  >Age</label
                >
                <input
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                  placeholder="25"
                  type="number"
                />
              </div>
              <div>
                <label
                  class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                  >Location</label
                >
                <input
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                  placeholder="Brooklyn, NY"
                  type="text"
                />
              </div>
            </div>
          </section>
          <!-- Section 2: Role Selection -->
          <section class="space-y-4">
            <div class="flex items-center gap-2 mb-2">
              <span
                class="text-xs font-bold uppercase tracking-wider text-primary"
                >02. My Goal</span
              >
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <label class="relative cursor-pointer group">
                <input
                  checked=""
                  class="peer sr-only"
                  name="role"
                  type="radio"
                />
                <div
                  class="p-4 border-2 border-slate-100 dark:border-slate-800 rounded-2xl bg-slate-50 dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center text-center gap-2"
                >
                  <span
                    class="material-symbols-outlined text-3xl text-slate-400 group-hover:text-primary transition-colors peer-checked:text-primary"
                    >search</span
                  >
                  <div class="font-bold text-slate-900 dark:text-slate-100">
                    Seeker
                  </div>
                  <div class="text-xs text-slate-500">
                    I am looking for a room
                  </div>
                </div>
              </label>
              <label class="relative cursor-pointer group">
                <input class="peer sr-only" name="role" type="radio" />
                <div
                  class="p-4 border-2 border-slate-100 dark:border-slate-800 rounded-2xl bg-slate-50 dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center text-center gap-2"
                >
                  <span
                    class="material-symbols-outlined text-3xl text-slate-400 group-hover:text-primary transition-colors peer-checked:text-primary"
                    >maps_home_work</span
                  >
                  <div class="font-bold text-slate-900 dark:text-slate-100">
                    Provider
                  </div>
                  <div class="text-xs text-slate-500">I am listing a room</div>
                </div>
              </label>
            </div>
          </section>
          <!-- Section 3: Lifestyle Tags -->
          <section class="space-y-4">
            <div class="flex items-center gap-2 mb-2">
              <span
                class="text-xs font-bold uppercase tracking-wider text-primary"
                >03. Lifestyle &amp; Habits</span
              >
            </div>
            <div class="flex flex-wrap gap-2">
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]">sunny</span>
                Early Bird
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >dark_mode</span
                >
                Night Owl
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-primary/10 text-primary border border-primary/20 rounded-full text-sm font-medium"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >check_circle</span
                >
                Tidy
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]">group</span>
                Social
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >volume_off</span
                >
                Quiet
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]">pets</span>
                Pet Friendly
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >diversity_3</span
                >
                LGBTQ+ Friendly
              </button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium hover:bg-primary/10 hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >smoke_free</span
                >
                Non-Smoker
              </button>
            </div>
          </section>
          <!-- Section 4: Preferences -->
          <section class="space-y-6">
            <div class="flex items-center gap-2 mb-2">
              <span
                class="text-xs font-bold uppercase tracking-wider text-primary"
                >04. Roommate Preferences</span
              >
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <!-- Sliders -->
              <div class="space-y-6">
                <div class="space-y-2">
                  <div class="flex justify-between text-sm font-semibold">
                    <span class="text-slate-700 dark:text-slate-300"
                      >Monthly Budget</span
                    >
                    <span class="text-primary">$800 - $2,500</span>
                  </div>
                  <input
                    class="w-full accent-primary h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer"
                    type="range"
                  />
                </div>
                <div class="space-y-2">
                  <div class="flex justify-between text-sm font-semibold">
                    <span class="text-slate-700 dark:text-slate-300"
                      >Age Range</span
                    >
                    <span class="text-primary">22 - 35</span>
                  </div>
                  <input
                    class="w-full accent-primary h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer"
                    type="range"
                  />
                </div>
              </div>
              <!-- Dropdowns -->
              <div class="space-y-4">
                <div>
                  <label
                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                    >Preferred Gender</label
                  >
                  <select
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none transition-all"
                  >
                    <option>Any Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Non-binary</option>
                  </select>
                </div>
                <div>
                  <label
                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                    >Move-in Date</label
                  >
                  <div class="relative">
                    <input
                      class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                      type="date"
                    />
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
        <!-- Footer -->
        <footer
          class="px-8 py-6 border-t border-slate-100 dark:border-slate-800 shrink-0"
        >
          <button
            class="w-full py-4 bg-primary hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98]"
          >
            Save &amp; Continue
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
